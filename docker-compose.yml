services:
  postgres:
    image: postgres:16
    container_name: scion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - scion-postgres:/var/lib/postgresql/data

volumes:
  scion-postgres:
